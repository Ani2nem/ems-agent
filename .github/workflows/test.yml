name: test

# PR gate: application test suites. Runs alongside `validate` (infra-only checks).
# Both backend and frontend tests run in mock mode (USE_BEDROCK=false), so no
# AWS credentials are needed.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest
        working-directory: backend
        env:
          USE_BEDROCK: "false"
        run: python -m pytest -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: lint
        working-directory: frontend
        run: npm run lint

      - name: vitest
        working-directory: frontend
        run: npm test
