name: deploy

# Deploys the EMS Agent SAM stack. Authenticates to AWS with short-lived
# credentials via GitHub OIDC assume-role - no long-lived keys are stored.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Least-privilege token scope: id-token to mint the OIDC JWT, contents to checkout.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  STACK_NAME: ${{ vars.STACK_NAME || 'ems-agent' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        working-directory: infra
        run: sam validate --lint

      - name: Build
        working-directory: infra
        run: sam build

      - name: Deploy
        working-directory: infra
        run: >
          sam deploy
          --stack-name "$STACK_NAME"
          --region "$AWS_REGION"
          --capabilities CAPABILITY_IAM
          --resolve-s3
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          StageName=prod
          BudgetAlertEmail=${{ vars.BUDGET_ALERT_EMAIL }}
          EnableSesEmail=${{ vars.ENABLE_SES_EMAIL || 'false' }}
          EscalationEmail=${{ vars.ESCALATION_EMAIL }}

      # --- Publish the built SPA to S3 + invalidate CloudFront ---
      # Skips cleanly until Workstream B lands frontend/package.json.
      - name: Read stack outputs
        id: outputs
        run: |
          get() { aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          {
            echo "bucket=$(get SiteBucketName)"
            echo "distribution=$(get DistributionId)"
            if [ -f frontend/package.json ]; then echo "has_frontend=true"; else echo "has_frontend=false"; fi
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.outputs.outputs.has_frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA
        if: steps.outputs.outputs.has_frontend == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Publish SPA and invalidate cache
        if: steps.outputs.outputs.has_frontend == 'true'
        run: |
          aws s3 sync frontend/dist "s3://${{ steps.outputs.outputs.bucket }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/*"
