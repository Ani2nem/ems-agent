name: deploy

# Deploys the EMS Agent SAM stack. Authenticates to AWS with short-lived
# credentials via GitHub OIDC assume-role - no long-lived keys are stored.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Least-privilege token scope: id-token to mint the OIDC JWT, contents to checkout.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  STACK_NAME: ${{ vars.STACK_NAME || 'ems-agent' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        working-directory: infra
        run: sam validate --lint

      - name: Build
        working-directory: infra
        run: sam build

      - name: Deploy
        working-directory: infra
        run: >
          sam deploy
          --stack-name "$STACK_NAME"
          --region "$AWS_REGION"
          --capabilities CAPABILITY_IAM
          --resolve-s3
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          StageName=prod
          BudgetAlertEmail=${{ vars.BUDGET_ALERT_EMAIL }}
          EnableSesEmail=${{ vars.ENABLE_SES_EMAIL || 'false' }}
          EscalationEmail=${{ vars.ESCALATION_EMAIL }}
